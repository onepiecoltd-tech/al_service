info:
  contact: {}
paths:
  /api/v1/admin/coin-packs:
    post:
      consumes:
      - application/json
      parameters:
      - description: Pack
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.coinPackRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              $ref: '#/definitions/model.CoinPack'
            type: object
      security:
      - BearerAuth: []
      summary: Create a coin pack (admin)
      tags:
      - admin
  /api/v1/admin/coin-packs/{id}:
    delete:
      parameters:
      - description: Pack ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: deleted
      security:
      - BearerAuth: []
      summary: Delete a coin pack (admin)
      tags:
      - admin
    put:
      consumes:
      - application/json
      parameters:
      - description: Pack ID
        in: path
        name: id
        required: true
        type: string
      - description: Pack
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.coinPackRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              $ref: '#/definitions/model.CoinPack'
            type: object
      security:
      - BearerAuth: []
      summary: Update a coin pack (admin)
      tags:
      - admin
  /api/v1/admin/exams:
    get:
      parameters:
      - description: page (default 1)
        in: query
        name: page
        type: integer
      - description: limit (default 20, max 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.examListEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.errorEnvelope'
      security:
      - BearerAuth: []
      summary: List exams (admin)
      tags:
      - admin
    post:
      consumes:
      - application/json
      parameters:
      - description: Exam
        in: body
        name: exam
        required: true
        schema:
          $ref: '#/definitions/handler.examRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.examEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Create an exam (admin)
      tags:
      - admin
  /api/v1/admin/exams/{id}:
    delete:
      parameters:
      - description: Exam ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: deleted
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Delete an exam (admin)
      tags:
      - admin
    put:
      consumes:
      - application/json
      parameters:
      - description: Exam ID
        in: path
        name: id
        required: true
        type: string
      - description: Exam
        in: body
        name: exam
        required: true
        schema:
          $ref: '#/definitions/handler.examRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.examEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Update an exam (admin)
      tags:
      - admin
  /api/v1/admin/overview:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.overviewEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Admin dashboard stats (counts + recent signups)
      tags:
      - admin
  /api/v1/admin/reports:
    get:
      parameters:
      - description: open (default) or resolved
        in: query
        name: status
        type: string
      - description: page (default 1)
        in: query
        name: page
        type: integer
      - description: limit (default 20, max 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.reportListEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.errorEnvelope'
      security:
      - BearerAuth: []
      summary: List moderation reports (admin)
      tags:
      - admin
  /api/v1/admin/reports/{id}/resolve:
    post:
      consumes:
      - application/json
      parameters:
      - description: Report ID
        in: path
        name: id
        required: true
        type: string
      - description: Action
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.resolveRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.reportListEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Resolve a report — dismiss/hide/remove (admin)
      tags:
      - admin
  /api/v1/admin/revenue:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.revenueEnvelope'
      security:
      - BearerAuth: []
      summary: Revenue summary (admin)
      tags:
      - admin
  /api/v1/admin/settings:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.settingListEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.errorEnvelope'
      security:
      - BearerAuth: []
      summary: List feature settings (admin)
      tags:
      - admin
  /api/v1/admin/settings/{key}:
    put:
      consumes:
      - application/json
      parameters:
      - description: Setting key
        in: path
        name: key
        required: true
        type: string
      - description: Value
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.updateSettingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.settingListEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Toggle a feature setting (admin)
      tags:
      - admin
  /api/v1/admin/transactions:
    get:
      parameters:
      - description: page
        in: query
        name: page
        type: integer
      - description: limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.adminTxnListEnvelope'
      security:
      - BearerAuth: []
      summary: All transactions (admin, paginated)
      tags:
      - admin
  /api/v1/admin/users:
    get:
      parameters:
      - description: search name/email
        in: query
        name: q
        type: string
      - description: all | pro | free
        in: query
        name: plan
        type: string
      - description: page (default 1)
        in: query
        name: page
        type: integer
      - description: limit (default 20, max 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.adminUserListEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.errorEnvelope'
      security:
      - BearerAuth: []
      summary: List all users (admin)
      tags:
      - admin
    post:
      consumes:
      - application/json
      parameters:
      - description: User
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/handler.createUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.adminUserEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorEnvelope'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handler.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Create a user (admin)
      tags:
      - admin
  /api/v1/admin/users/{id}:
    put:
      consumes:
      - application/json
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/handler.updateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.adminUserEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorEnvelope'
      security:
      - BearerAuth: []
      summary: Update a user's plan/role/status (admin)
      tags:
      - admin
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns a JWT valid for 24 hours.
      parameters:
      - description: Login credentials
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/handler.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: JWT and the authenticated user
          schema:
            $ref: '#/definitions/handler.loginEnvelope'
        "400":
          description: malformed request
          schema:
            $ref: '#/definitions/handler.errorEnvelope'
        "401":
          description: invalid email or password
          schema:
            $ref: '#/definitions/handler.errorEnvelope'
      summary: Log in with email and password
      tags:
      - auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Creates an account (if signups are open) and returns a JWT.
      parameters:
      - description: Registration
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.registerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.loginEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorEnvelope'
        "403":
          description: signups disabled
          schema:
            $ref: '#/definitions/handler.errorEnvelope'
        "409":
          description: email exists
          schema:
            $ref: '#/definitions/handler.errorEnvelope'
      summary: Register a new account
      tags:
      - auth
  /api/v1/blog:
    get:
      parameters:
      - description: page (default 1)
        in: query
        name: page
        type: integer
