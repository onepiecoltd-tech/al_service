services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword137
      POSTGRES_DB: learning_languages
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d learning_languages"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
