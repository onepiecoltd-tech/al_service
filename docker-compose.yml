# Go API only. Run after the DB is up:
#   docker compose -f docker-compose.app.yml up -d --build
services:
  api:
    build: .
    # All config (DATABASE_URL, JWT_SECRET, GEMINI_API_KEY, GOOGLE_CLIENT_ID,
    # PORT, ENV) is read from .env and passed into the container as-is.
    env_file:
      - .env
    # No shared compose network: the DB is reached over the host. Map the
    # host gateway so DATABASE_URL can point at it, e.g.
    #   DATABASE_URL=postgres://admin:secretpassword137@host.docker.internal:5432/learning_languages?sslmode=disable
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
